<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EspressiScale Display Selection</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f2f2f5;
      color: #1c1c1e;
    }
    .card {
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .install-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 500;
      color: #ffffff;
      background-color: #007aff;
      border: none;
      border-radius: 24px;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
      cursor: pointer;
      transition: background-color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      outline: none;
      text-decoration: none;
    }
    .install-btn:hover {
      background-color: #005bb5;
      box-shadow: 0 6px 16px rgba(0, 91, 181, 0.3);
    }
    .install-btn:focus,
    .install-btn:focus-visible {
      outline: none;
    }
    .install-btn.disabled {
      background-color: #c7c7cc;
      box-shadow: none;
      cursor: not-allowed;
      pointer-events: none;
      color: #ffffff;
    }
    .note {
      font-size: 0.875rem;
      color: #6e6e73;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Choose EspressiScale type</h1>
    <div class="button-group">
      <a href="/oled.html" class="install-btn">OLED</a>
      <a href="/lcd.html" class="install-btn">LCD</a>
      <a href="/display_bar.html" class="install-btn disabled" aria-disabled="true">Display Bar</a>
    </div>
    <p class="note">Display Bar support coming soon.</p>
  </div>
</body>
</html>
